<h2>Search Results for "{{ query }}"</h2>
{% for story in results %}
  <div class="card my-3">
    <div class="card-body">
      <h5><a href="{% url 'story_detail' story.id %}">{{ story.title }}</a></h5>
      <p>by {{ story.author.username }}</p>
    </div>
  </div>
{% empty %}
  <p>No matching stories found.</p>
{% endfor %}
