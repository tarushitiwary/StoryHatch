<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StoryHatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light px-3">
    <a class="navbar-brand" href="{% url 'home' %}">StoryHatch</a>

    <div class="collapse navbar-collapse">
      <form action="{% url 'search' %}" method="get" class="d-flex ms-auto">
        <input class="form-control me-2" type="text" name="q" placeholder="Search stories...">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </nav>

  <div class="container mt-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <form action="{% url 'search' %}" method="get" class="d-flex">
  <input type="text" name="q" class="form-control me-2" placeholder="Search stories...">
  <button type="submit" class="btn btn-outline-success">Search</button>
    </form>

</body>
</html>
